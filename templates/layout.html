<!DOCTYPE html>
<html lang="{{ lang }}" class="no-js">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXC8R75DEN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-WXC8R75DEN');
    </script>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Content-Language" content="{{ lang }}">
    <!-- Use title if it's in the page YAML frontmatter -->
    <title>{{ "Learn " + language + " in Y Minutes" if language else "Learn X in Y Minutes: Scenic Programming Language Tours" }}</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/css/index.css">

    <link rel="canonical" href="https://learnxinyminutes.com/{{ path|replace('index.html', '') }}">
    <script>
      var THEME_KEY = "lxiym_theme";
      function set_theme(theme) {
          var el = document.getElementsByTagName("html")[0];
          if (!el) {
            return;
          }
          el.className = theme === "dark" ? "dark" : "light";
          localStorage.setItem(THEME_KEY, theme);
      }

      function load_theme() {
        var theme = localStorage.getItem(THEME_KEY);
        if (!theme) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
        }
        set_theme(theme)
      }

      // Attempt immediate application of html style
      load_theme();

      // Backup: do it onload. Will flash, but better than nothing.
      window.onload = function(){
        load_theme();
      };

      // Listen for system preference change
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", ({matches:isDark}) => {
          set_theme(isDark ? "dark" : "light")
        })


      var LANG_KEY = "lxiym_lang";
      document.addEventListener('DOMContentLoaded', function() {
        var langSelect = document.getElementById('lang-select');
        if (!langSelect) {
          return
        }

        function set_lang(lang) {
          langSelect.value = lang

          var links = document.querySelectorAll('td.lang a');
          links.forEach(function(link) {
            if (link.textContent === lang) {
              link.classList.add('selected');
            } else {
              link.classList.remove('selected');
            }
          });
        }

        function load_lang() {
          var lang = localStorage.getItem(LANG_KEY);
          if (lang) {
            set_lang(lang);
          }
        }

        load_lang();
        // Backup: do it onload. Will blink, but better than nothing.
        window.onload = function(){
          load_lang();
        };

        langSelect.addEventListener('change', function() {
          var lang = this.value;
          set_lang(lang);
          localStorage.setItem(LANG_KEY, lang);
        });
      });
    </script>
  </head>
  <body>
    <div class="container">
{% block content %}{% endblock %}
    </div>
  </body>
</html>
